<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Financial Dashboard</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3efe7;
      --panel: #fffdf8;
      --panel-strong: #f7f1e7;
      --ink: #1f2933;
      --muted: #5f6c7b;
      --line: #ddcfbe;
      --accent: #9c4f2d;
      --accent-soft: #ead0c2;
      --shadow: 0 18px 44px rgba(65, 45, 28, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, rgba(156, 79, 45, 0.12), transparent 26%),
        linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .page {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      display: grid;
      gap: 10px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 3.2vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .subtitle,
    .meta,
    .empty-note {
      color: var(--muted);
    }

    .controls,
    .summary,
    .content {
      display: grid;
      gap: 16px;
    }

    .controls {
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      margin-bottom: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .control-card,
    .card {
      padding: 18px 20px;
    }

    .control-card label,
    .section-label {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    select,
    button {
      font: inherit;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .summary {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      margin-bottom: 20px;
    }

    .chart-mode-section {
      padding: 14px;
      margin-bottom: 20px;
    }

    .chart-mode-section.is-hidden {
      display: none;
    }

    .metric-value {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .metric-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .content {
      grid-template-columns: minmax(340px, 440px) minmax(0, 1fr);
      align-items: start;
    }

    .content.content-wide-chart {
      grid-template-columns: 1fr;
    }

    .content.content-wide-chart #chartWrap {
      min-height: 300px;
    }

    .content.content-wide-chart .table-card {
      max-width: none;
    }

    .table-card.is-hidden {
      display: none;
    }

    .transaction-body {
      display: grid;
      gap: 14px;
    }

    .transaction-body.has-category-filter {
      grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
      align-items: start;
    }

    .transaction-category-panel {
      display: grid;
      gap: 10px;
    }

    .transaction-category-panel.is-hidden {
      display: none;
    }

    .transaction-category-panel button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .transaction-category-panel button.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(156, 79, 45, 0.16);
    }

    .chart-card,
    .table-card {
      padding: 20px;
    }

    .chart-frame {
      display: grid;
      gap: 18px;
    }

    .chart-controls {
      display: grid;
      gap: 12px;
    }

    #chartWrap {
      position: relative;
      min-height: 380px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #fffaf2 0%, #fff 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    #chartWrap svg {
      max-width: 100%;
      height: auto;
      overflow: visible;
    }

    .chart-center-label {
      font-size: 0.85rem;
      fill: var(--muted);
      text-anchor: middle;
    }

    .chart-center-value {
      font-size: 1.4rem;
      font-weight: 700;
      fill: var(--ink);
      text-anchor: middle;
    }

    .axis-label {
      font-size: 0.72rem;
      fill: var(--muted);
    }

    .line-chart-path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1.35;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .monthly-trend-title {
      font-size: 0.8rem;
      font-weight: 700;
      fill: var(--ink);
    }

    .balance-point {
      fill: var(--accent);
      stroke: #fffdf8;
      stroke-width: 1.25;
      cursor: crosshair;
    }

    .balance-point-group.is-active .balance-point,
    .balance-point:hover {
      stroke: var(--ink);
      stroke-width: 2;
    }

    .balance-hit-area {
      fill: transparent;
      cursor: crosshair;
    }

    .chart-tooltip {
      position: absolute;
      z-index: 4;
      min-width: 150px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 253, 248, 0.96);
      box-shadow: 0 12px 28px rgba(65, 45, 28, 0.18);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 12px));
      transition: opacity 100ms ease;
    }

    .chart-tooltip.is-visible {
      opacity: 1;
    }

    .tooltip-label {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .tooltip-value {
      font-size: 1.05rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .slice {
      cursor: pointer;
      transition: opacity 140ms ease, transform 140ms ease;
      transform-origin: 180px 180px;
    }

    .slice:hover,
    .slice.active {
      opacity: 0.88;
      transform: scale(1.02);
    }

    .legend {
      display: grid;
      gap: 10px;
    }

    .legend button {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .legend button.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(156, 79, 45, 0.16);
    }

    .chart-mode-toggle {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-strong);
    }

    .chart-mode-toggle button {
      padding: 9px 12px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      text-align: center;
      color: var(--muted);
    }

    .chart-mode-toggle button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(65, 45, 28, 0.12);
    }

    .trend-selector {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel-strong);
    }

    .trend-options {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .trend-option {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .trend-option input {
      accent-color: var(--accent);
    }

    .trend-actions {
      display: flex;
      justify-content: flex-end;
    }

    .trend-actions button {
      width: auto;
      padding: 8px 12px;
      border-radius: 999px;
    }

    .legend-top,
    .legend-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .legend-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .legend-name {
      font-weight: 700;
    }

    .legend-meta {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .balance-stats {
      display: grid;
      gap: 10px;
    }

    .line-chart-details {
      display: grid;
      gap: 10px;
    }

    .line-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .line-metric-card {
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    .line-metric-card .metric-value {
      font-size: 1.35rem;
      margin-bottom: 2px;
    }

    .chart-footnote {
      color: var(--muted);
      font-size: 0.82rem;
      text-align: right;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
    }

    .stat-row strong {
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .control-card.is-hidden {
      display: none;
    }

    .filter-chip {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--ink);
    }

    .clear-button {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }

    .page-size-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-strong);
    }

    .page-size-toggle button {
      min-width: 42px;
      padding: 7px 10px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .page-size-toggle button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(65, 45, 28, 0.12);
    }

    .pagination-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .pagination-controls button {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    .pagination-controls button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .page-status {
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .table-scroll {
      max-height: 560px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffdf8;
      margin-top: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px 8px;
      border-bottom: 1px solid #ece1d3;
      vertical-align: top;
    }

    th {
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 1;
      background: #fffdf8;
    }

    td.amount {
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--panel-strong);
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 920px) {
      .controls,
      .transaction-body.has-category-filter,
      .content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    ];

    const currency = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' });
    const wholeDollarCurrency = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });
    const monthLabel = new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'long', timeZone: 'UTC' });
    const shortMonthLabel = new Intl.DateTimeFormat('en-US', { month: 'short', timeZone: 'UTC' });
    const pageSizes = [10, 20, 50, 100];
    const state = { account: accounts[0] ? accounts[0].slug : '', month: 'ALL', category: null, chartMode: 'pie', trendCategories: null, pageSize: 20, pageIndex: 0 };

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function getCurrentAccount() {
      return accounts.find((account) => account.slug === state.account) || accounts[0] || null;
    }

    function shouldShowBalanceChart(account) {
      return account && (account.kind === 'savings' || account.kind === 'credit_card');
    }

    function isLineChartAccount(account) {
      return shouldShowBalanceChart(account);
    }

    function shouldShowMonthlySpendingTrend(account) {
      return account && ['main-checking', 'bills-checking'].includes(account.slug);
    }

    function shouldShowTransactions(account) {
      return account && account.kind !== 'savings';
    }

    function accountActionLabel(account) {
      if (!account) {
        return 'transactions';
      }
      if (account.kind === 'credit_card') {
        return 'charges';
      }
      return 'debit transactions';
    }

    function getMonthOptions() {
      const account = getCurrentAccount();
      if (!account) {
        return [];
      }
      return Array.from(new Set(account.transactions.map((item) => item.month))).sort().reverse();
    }

    function getMonthFilteredTransactions() {
      const account = getCurrentAccount();
      if (!account) {
        return [];
      }
      return account.transactions.filter((item) => state.month === 'ALL' || item.month === state.month);
    }

    function getVisibleTransactions() {
      return getMonthFilteredTransactions().filter((item) => !state.category || item.spendingCategory === state.category);
    }

    function getMappingStats(baseTransactions, categoryRows) {
      const total = baseTransactions.reduce((sum, item) => sum + item.amount, 0);
      const mappedTotal = baseTransactions
        .filter((item) => item.spendingCategory !== 'Uncategorized')
        .reduce((sum, item) => sum + item.amount, 0);
      const uncategorizedTotal = total - mappedTotal;
      const coverage = total === 0 ? 0 : (mappedTotal / total) * 100;

      return { total, mappedTotal, uncategorizedTotal, coverage, categoryCount: categoryRows.length };
    }

    function aggregateByCategory(items) {
      const totals = new Map();
      for (const item of items) {
        const existing = totals.get(item.spendingCategory) || { amount: 0, count: 0 };
        existing.amount += item.amount;
        existing.count += 1;
        totals.set(item.spendingCategory, existing);
      }

      return Array.from(totals.entries())
        .map(([category, value]) => ({ category, amount: value.amount, count: value.count }))
        .sort((left, right) => right.amount - left.amount);
    }

    function getMonthlyTrendCategories(account) {
      if (!account) {
        return [];
      }
      return aggregateByCategory(account.transactions).map((row) => row.category);
    }

    function getSelectedTrendCategories(account) {
      const categories = getMonthlyTrendCategories(account);
      if (state.trendCategories === null) {
        return categories;
      }
      return state.trendCategories.filter((category) => categories.includes(category));
    }

    function getSelectedTrendLabel(account) {
      const categories = getMonthlyTrendCategories(account);
      const selectedCategories = getSelectedTrendCategories(account);
      if (selectedCategories.length === categories.length) {
        return 'All categories';
      }
      if (!selectedCategories.length) {
        return 'No categories selected';
      }
      if (selectedCategories.length === 1) {
        return selectedCategories[0];
      }
      return `${selectedCategories.length} categories selected`;
    }

    function getMonthlyTrendRows(account) {
      if (!account) {
        return [];
      }

      const months = Array.from(new Set(account.transactions.map((item) => item.month))).sort();
      const totals = new Map(months.map((monthValue) => [monthValue, 0]));
      const selectedCategories = getSelectedTrendCategories(account);
      account.transactions
        .filter((item) => selectedCategories.includes(item.spendingCategory))
        .forEach((item) => {
          totals.set(item.month, (totals.get(item.month) || 0) + item.amount);
        });

      return months.map((monthValue) => ({ month: monthValue, amount: totals.get(monthValue) || 0 }));
    }

    function getMonthlyTrendStats(account) {
      const rows = getMonthlyTrendRows(account);
      const total = rows.reduce((sum, row) => sum + row.amount, 0);
      const average = rows.length ? total / rows.length : 0;
      const high = rows.reduce((highest, row) => row.amount > highest.amount ? row : highest, { month: '', amount: 0 });
      return { rows, total, average, high };
    }

    function pickColor(category, index) {
      if (category === 'Uncategorized') {
        return '#b0a79c';
      }
      return palette[index % palette.length];
    }

    function formatMonth(monthValue) {
      if (monthValue === 'ALL') {
        return 'all months';
      }
      return monthLabel.format(new Date(`${monthValue}-01T00:00:00Z`));
    }

    function formatShortMonth(monthValue) {
      return shortMonthLabel.format(new Date(`${monthValue}-01T00:00:00Z`));
    }

    function polarToCartesian(cx, cy, radius, angleDegrees) {
      const angleRadians = (angleDegrees - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(angleRadians),
        y: cy + radius * Math.sin(angleRadians),
      };
    }

    function describeArc(cx, cy, radius, startAngle, endAngle) {
      const start = polarToCartesian(cx, cy, radius, endAngle);
      const end = polarToCartesian(cx, cy, radius, startAngle);
      const largeArc = endAngle - startAngle <= 180 ? '0' : '1';
      return `M ${cx} ${cy} L ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArc} 0 ${end.x} ${end.y} Z`;
    }

    function selectYAxisIncrement(maxBalance) {
      const presets = [100, 250, 500, 1000, 1500, 2000, 2500, 5000, 10000, 20000, 50000];
      let selected = presets[0];

      presets.forEach((increment, index) => {
        const axisMax = increment * 5;
        const lesserIncrement = presets[Math.max(0, index - 1)];
        const fillsAxis = maxBalance >= axisMax * (2 / 3);
        const exceedsLesserAxis = index > 0 && maxBalance > lesserIncrement * 5;
        if (maxBalance <= axisMax && (fillsAxis || exceedsLesserAxis)) {
          selected = increment;
        }
      });

      return selected;
    }

      const select = document.getElementById('accountFilter');
      select.innerHTML = '';

      for (const account of accounts) {
        const option = document.createElement('option');
        option.value = account.slug;
        option.textContent = `${account.label} (${account.kindLabel})`;
        select.appendChild(option);
      }

      select.value = state.account;
      select.addEventListener('change', (event) => {
        state.account = event.target.value;
        state.month = 'ALL';
        state.category = null;
        state.chartMode = 'pie';
        state.trendCategories = null;
        state.pageSize = 20;
        state.pageIndex = 0;

    function populateMonthFilter() {
      const select = document.getElementById('monthFilter');
      select.innerHTML = '';

      const allOption = document.createElement('option');
      allOption.value = 'ALL';
      allOption.textContent = 'All months';
      select.appendChild(allOption);

      for (const monthValue of getMonthOptions()) {
        const option = document.createElement('option');
        option.value = monthValue;
        option.textContent = formatMonth(monthValue);
        select.appendChild(option);
      }

      const monthOptions = getMonthOptions();
      if (state.month !== 'ALL' && !monthOptions.includes(state.month)) {
        state.month = 'ALL';
      }

      select.value = state.month;
      select.onchange = (event) => {
        state.month = event.target.value;
        state.category = null;
        state.pageSize = 20;
        state.pageIndex = 0;
        render();

      toggle.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          state.pageSize = Number(button.getAttribute('data-page-size'));
          state.pageIndex = 0;
          render();
        });
      });
    }

    function renderPaginationControls(account, itemCount) {
      const controls = document.getElementById('paginationControls');
      if (!shouldShowTransactions(account)) {
        controls.innerHTML = '';
        return;
      }

      const totalPages = Math.max(1, Math.ceil(itemCount / state.pageSize));
      state.pageIndex = Math.min(state.pageIndex, totalPages - 1);
      controls.innerHTML = `
        <button type="button" data-page-action="previous" ${state.pageIndex === 0 ? 'disabled' : ''}>Previous</button>
        <span class="page-status">Page ${state.pageIndex + 1} of ${totalPages}</span>
        <button type="button" data-page-action="next" ${state.pageIndex >= totalPages - 1 ? 'disabled' : ''}>Next</button>
      `;

      controls.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          if (button.getAttribute('data-page-action') === 'previous') {
            state.pageIndex = Math.max(0, state.pageIndex - 1);
          } else {
            state.pageIndex = Math.min(totalPages - 1, state.pageIndex + 1);
          }
          render();
        });
      });
    }

    function getBalanceStats(account) {
      const points = account.balancePoints || [];
      if (!points.length) {
        return null;
      }

      const balances = points.map((point) => point.balance);
      const latest = points[points.length - 1];
      return {
        latest,
        min: Math.min(...balances),
        max: Math.max(...balances),
        count: points.length,
      };
    }

    function renderSummary(account, baseTransactions, categoryRows) {
      const stats = getMappingStats(baseTransactions, categoryRows);
      const balanceStats = getBalanceStats(account);

      const cards = [
        { label: account.kind === 'credit_card' ? 'Charge Total' : 'Spending Total', value: currency.format(stats.total), note: `${baseTransactions.length} ${accountActionLabel(account)}` },
      ];

      if (!isLineChartAccount(account)) {
        cards.push(
          { label: 'Categories', value: String(stats.categoryCount), note: '' },
          { label: 'Mapped Coverage', value: `${stats.coverage.toFixed(1)}%`, note: 'Share of spend matched to a named category' },
          balanceStats
            ? { label: account.kind === 'credit_card' ? 'Latest Debt' : 'Latest Balance', value: currency.format(balanceStats.latest.balance), note: `` }
            : { label: 'Uncategorized', value: currency.format(stats.uncategorizedTotal), note: 'Transactions that still need new mapping rules' },
        );
      }

      const container = document.getElementById('summaryCards');
      container.innerHTML = cards.map((card) => `
        <div class="panel card">
          <div class="section-label">${card.label}</div>
          <div class="metric-value">${card.value}</div>
          <div class="metric-note">${card.note}</div>
        </div>
      `).join('');
    }

    function renderMonthlySpendingTrend(account) {
      const rows = getMonthlyTrendRows(account);
      if (rows.length < 2) {
        return '<div class="empty-note">Not enough monthly spending history to draw a trend line.</div>';
      }

      const width = 520;
      const height = 240;
      const padding = { top: 32, right: 30, bottom: 42, left: 84 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      const maxAmount = Math.max(...rows.map((row) => row.amount));
      const axisIncrement = selectYAxisIncrement(Math.max(1, maxAmount));
      const axisMax = axisIncrement * 5;
      const xFor = (index) => padding.left + (rows.length === 1 ? chartWidth / 2 : (index / (rows.length - 1)) * chartWidth);
      const yFor = (amount) => padding.top + ((axisMax - amount) / axisMax) * chartHeight;
      const pathData = rows.map((row, index) => `${index === 0 ? 'M' : 'L'} ${xFor(index).toFixed(2)} ${yFor(row.amount).toFixed(2)}`).join(' ');
      const yTicks = [5, 4, 3, 2, 1].map((multiplier) => multiplier * axisIncrement);
      const pointMarks = rows.map((row, index) => `
        <g class="balance-point-group">
          <circle class="balance-point" cx="${xFor(index).toFixed(2)}" cy="${yFor(row.amount).toFixed(2)}" r="2.25"></circle>
          <circle class="balance-hit-area" cx="${xFor(index).toFixed(2)}" cy="${yFor(row.amount).toFixed(2)}" r="7" data-date="${escapeHtml(formatMonth(row.month))}" data-balance="${escapeHtml(currency.format(row.amount))}"></circle>
        </g>
      `).join('');

      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Spending by Month">
          <rect x="${padding.left}" y="${padding.top}" width="${chartWidth}" height="${chartHeight}" fill="#fffdf8" stroke="#ddcfbe"></rect>
          ${yTicks.map((tick) => `
            <line x1="${padding.left}" x2="${padding.left + chartWidth}" y1="${yFor(tick).toFixed(2)}" y2="${yFor(tick).toFixed(2)}" stroke="#ece1d3"></line>
            <text x="${padding.left - 10}" y="${(yFor(tick) + 4).toFixed(2)}" text-anchor="end" class="axis-label">${wholeDollarCurrency.format(tick)}</text>
          `).join('')}
          ${rows.map((row, index) => `
            <text x="${xFor(index).toFixed(2)}" y="${height - 20}" text-anchor="middle" class="axis-label">${formatShortMonth(row.month)}</text>
          `).join('')}
          <path class="line-chart-path" d="${pathData}"></path>
          ${pointMarks}
          <text x="${padding.left}" y="18" class="monthly-trend-title">Spending by Month</text>
        </svg>
        <div id="chartTooltip" class="chart-tooltip" aria-hidden="true">
          <div class="tooltip-label"></div>
          <div class="tooltip-value"></div>
        </div>
      `;
    }

    function attachLineChartTooltip(container) {
      const tooltip = container.querySelector('#chartTooltip');
      if (!tooltip) {
        return;
      }
      const tooltipLabel = tooltip.querySelector('.tooltip-label');
      const tooltipValue = tooltip.querySelector('.tooltip-value');
      container.querySelectorAll('.balance-hit-area').forEach((point) => {
        point.addEventListener('mouseenter', () => {
          point.closest('.balance-point-group').classList.add('is-active');
          tooltipLabel.textContent = point.getAttribute('data-date');
          tooltipValue.textContent = point.getAttribute('data-balance');
          tooltip.classList.add('is-visible');
        });
        point.addEventListener('mousemove', (event) => {
          const bounds = container.getBoundingClientRect();
          tooltip.style.left = `${event.clientX - bounds.left}px`;
          tooltip.style.top = `${event.clientY - bounds.top}px`;
        });
        point.addEventListener('mouseleave', () => {
          point.closest('.balance-point-group').classList.remove('is-active');
          tooltip.classList.remove('is-visible');
        });
      });
    }

    function renderChart(categoryRows, account) {
      const container = document.getElementById('chartWrap');
      const total = categoryRows.reduce((sum, row) => sum + row.amount, 0);

      if (shouldShowMonthlySpendingTrend(account) && state.chartMode === 'line') {
        container.innerHTML = renderMonthlySpendingTrend(account);
        attachLineChartTooltip(container);
        return;
      }

      if (!categoryRows.length || total === 0) {
        container.innerHTML = '<div class="empty-note">No spending transactions available for the current filter.</div>';
        return;
      }

      const svgParts = [
        '<svg viewBox="0 0 360 360" role="img" aria-label="Spending category pie chart">',
        '<circle cx="180" cy="180" r="126" fill="#f2e8dc"></circle>'
      ];

      let startAngle = 0;
      categoryRows.forEach((row, index) => {
        const sweep = (row.amount / total) * 360;
        const endAngle = startAngle + sweep;
        const path = sweep >= 359.999
          ? '<circle cx="180" cy="180" r="126" fill="' + pickColor(row.category, index) + '" class="slice' + (state.category === row.category ? ' active' : '') + '" data-category="' + row.category.replace(/"/g, '&quot;') + '"></circle>'
          : '<path d="' + describeArc(180, 180, 126, startAngle, endAngle) + '" fill="' + pickColor(row.category, index) + '" class="slice' + (state.category === row.category ? ' active' : '') + '" data-category="' + row.category.replace(/"/g, '&quot;') + '"></path>';
        svgParts.push(path);
        startAngle = endAngle;
      });

      svgParts.push('<circle cx="180" cy="180" r="74" fill="#fffdf8"></circle>');
      svgParts.push('<text x="180" y="168" class="chart-center-label">Current view</text>');
      svgParts.push('<text x="180" y="194" class="chart-center-value">' + currency.format(total) + '</text>');
      svgParts.push('<text x="180" y="216" class="chart-center-label">' + formatMonth(state.month) + '</text>');
      svgParts.push('</svg>');

      container.innerHTML = svgParts.join('');
      container.querySelectorAll('.slice').forEach((slice) => {
        slice.addEventListener('click', () => {
          const category = slice.getAttribute('data-category');
          state.category = state.category === category ? null : category;
          state.pageIndex = 0;
          render();
        });
      });
    }

    function renderBalanceChart(account) {
      const container = document.getElementById('chartWrap');
      const points = account.balancePoints || [];
      if (points.length < 2) {
        container.innerHTML = '<div class="empty-note">Not enough balance history to draw a line chart.</div>';
        return;
      }

      const width = 520;
      const height = 280;
      const padding = { top: 24, right: 34, bottom: 42, left: 86 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;
      const balances = points.map((point) => point.balance);
      const maxBalance = Math.max(...balances);
      const axisIncrement = selectYAxisIncrement(maxBalance);
      const axisMin = 0;
      const axisMax = axisIncrement * 5;
      const range = axisMax - axisMin;
      const xFor = (index) => padding.left + (points.length === 1 ? chartWidth / 2 : (index / (points.length - 1)) * chartWidth);
      const yFor = (balance) => padding.top + ((axisMax - balance) / range) * chartHeight;
      const pathData = points.map((point, index) => `${index === 0 ? 'M' : 'L'} ${xFor(index).toFixed(2)} ${yFor(point.balance).toFixed(2)}`).join(' ');
      const latest = points[points.length - 1];
      const first = points[0];
      const midpoint = Math.floor(points.length / 2);
      const yTicks = [5, 4, 3, 2, 1].map((multiplier) => multiplier * axisIncrement);
      const xTicks = [
        { index: 0, label: first.date },
        { index: midpoint, label: points[midpoint].date },
        { index: points.length - 1, label: latest.date },
      ];

      const pointMarks = points.map((point, index) => `
        <g class="balance-point-group">
          <circle class="balance-point" cx="${xFor(index).toFixed(2)}" cy="${yFor(point.balance).toFixed(2)}" r="2.25"></circle>
          <circle class="balance-hit-area" cx="${xFor(index).toFixed(2)}" cy="${yFor(point.balance).toFixed(2)}" r="7" data-date="${escapeHtml(point.date)}" data-balance="${escapeHtml(currency.format(point.balance))}"></circle>
        </g>
      `).join('');

      const label = account.kind === 'credit_card' ? 'Credit card balance over time' : 'Savings balance over time';
      container.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${label}">
          <rect x="${padding.left}" y="${padding.top}" width="${chartWidth}" height="${chartHeight}" fill="#fffdf8" stroke="#ddcfbe"></rect>
          ${yTicks.map((tick) => `
            <line x1="${padding.left}" x2="${padding.left + chartWidth}" y1="${yFor(tick).toFixed(2)}" y2="${yFor(tick).toFixed(2)}" stroke="#ece1d3"></line>
            <text x="${padding.left - 10}" y="${(yFor(tick) + 4).toFixed(2)}" text-anchor="end" class="axis-label">${wholeDollarCurrency.format(tick)}</text>
          `).join('')}
          ${xTicks.map((tick) => `
            <text x="${xFor(tick.index).toFixed(2)}" y="${height - 20}" text-anchor="middle" class="axis-label">${tick.label}</text>
          `).join('')}
          <path class="line-chart-path" d="${pathData}"></path>
          ${pointMarks}
          <text x="${padding.left}" y="18" class="axis-label">${account.kind === 'credit_card' ? 'Debt balance' : 'Account balance'}</text>
        </svg>
        <div id="chartTooltip" class="chart-tooltip" aria-hidden="true">
          <div class="tooltip-label"></div>
          <div class="tooltip-value"></div>
        </div>
      `;

      const tooltip = container.querySelector('#chartTooltip');
      const tooltipLabel = tooltip.querySelector('.tooltip-label');
      const tooltipValue = tooltip.querySelector('.tooltip-value');
      container.querySelectorAll('.balance-hit-area').forEach((point) => {
        point.addEventListener('mouseenter', () => {
          point.closest('.balance-point-group').classList.add('is-active');
          tooltipLabel.textContent = point.getAttribute('data-date');
          tooltipValue.textContent = point.getAttribute('data-balance');
          tooltip.classList.add('is-visible');
        });
        point.addEventListener('mousemove', (event) => {
          const bounds = container.getBoundingClientRect();
          tooltip.style.left = `${event.clientX - bounds.left}px`;
          tooltip.style.top = `${event.clientY - bounds.top}px`;
        });
        point.addEventListener('mouseleave', () => {
          point.closest('.balance-point-group').classList.remove('is-active');
          tooltip.classList.remove('is-visible');
        });
      });
    }

    function renderChartModeControls(account) {
      const section = document.getElementById('chartModeSection');
      if (!shouldShowMonthlySpendingTrend(account)) {
        section.innerHTML = '';
        section.classList.add('is-hidden');
        return;
      }

      section.classList.remove('is-hidden');
      section.innerHTML = `
        <div class="chart-mode-toggle" aria-label="Chart type">
          <button type="button" class="${state.chartMode === 'pie' ? 'active' : ''}" data-chart-mode="pie">Pie Chart</button>
          <button type="button" class="${state.chartMode === 'line' ? 'active' : ''}" data-chart-mode="line">Line Graph</button>
        </div>
      `;

      section.querySelectorAll('button[data-chart-mode]').forEach((button) => {
        button.addEventListener('click', () => {
          state.chartMode = button.getAttribute('data-chart-mode') || 'pie';
          if (state.chartMode === 'line') {
            state.month = 'ALL';
            state.category = null;
          }
          render();
        });
      });

    function renderChartControls(account) {
      const controls = document.getElementById('chartControls');
      if (!shouldShowMonthlySpendingTrend(account) || state.chartMode !== 'line') {
        controls.innerHTML = '';
        return;
      }

      const trendCategories = getMonthlyTrendCategories(account);
      const selectedCategories = getSelectedTrendCategories(account);

      controls.innerHTML = `
        <div class="trend-selector" aria-label="Monthly spending trend categories">
          <div class="legend-top">
            <div class="section-label">Categories</div>
            <div class="trend-actions">
              <button type="button" data-trend-action="toggle-all">${allSelected ? 'Deselect All' : 'Select All'}</button>
            </div>
          </div>
          <div class="trend-options">
            ${trendCategories.map((category) => `
              <label class="trend-option" data-trend-category="${escapeHtml(category)}"><input type="checkbox" name="trendCategory" value="${escapeHtml(category)}" ${selectedCategories.includes(category) ? 'checked' : ''}> ${escapeHtml(category)}</label>
            `).join('')}
          </div>
        </div>
      `;

      const toggleAll = controls.querySelector('button[data-trend-action="toggle-all"]');

        toggleAll.addEventListener('click', () => {

    function renderLegend(categoryRows, account) {
      const total = categoryRows.reduce((sum, row) => sum + row.amount, 0);
      const legend = document.getElementById('legend');

      const categoryLegend = state.chartMode === 'line' && shouldShowMonthlySpendingTrend(account) ? '' : categoryRows.map((row, index) => {
        const percent = total === 0 ? 0 : (row.amount / total) * 100;
        const active = state.category === row.category ? ' active' : '';
        return `
          <button type="button" class="${active}" data-category="${row.category}">
            <div class="legend-top">
              <div class="legend-left">
                <span class="swatch" style="background:${pickColor(row.category, index)}"></span>
                <span class="legend-name">${row.category}</span>
              </div>
              <span>${currency.format(row.amount)}</span>
            </div>
            <div class="legend-bottom">
              <span class="legend-meta">${row.count} transactions</span>
              <span class="legend-meta">${percent.toFixed(1)}%</span>
            </div>
          </button>
        `;
      }).join('');
      const trendStats = shouldShowMonthlySpendingTrend(account) && state.chartMode === 'line' ? getMonthlyTrendStats(account) : null;

        <div class="line-chart-details">
          <div class="line-metrics">
            <div class="line-metric-card">
              <div class="section-label">Selected Total</div>
              <div class="metric-value">${currency.format(trendStats.total)}</div>
              <div class="metric-note">${getSelectedTrendLabel(account)}</div>
            </div>
            <div class="line-metric-card">
              <div class="section-label">Monthly Average</div>
              <div class="metric-value">${currency.format(trendStats.average)}</div>
              <div class="metric-note">Across ${trendStats.rows.length} months</div>
            </div>
            <div class="line-metric-card">
              <div class="section-label">Highest Month</div>
              <div class="metric-value">${currency.format(trendStats.high.amount)}</div>
              <div class="metric-note">${trendStats.high.month ? formatMonth(trendStats.high.month) : ''}</div>
            </div>
          </div>
        </div>
      ` : '';

      legend.innerHTML = trendDetails + categoryLegend;

      legend.querySelectorAll('button[data-category]').forEach((button) => {
        button.addEventListener('click', () => {
          const category = button.getAttribute('data-category');
          state.category = state.category === category ? null : category;
          state.pageIndex = 0;
          render();
        });
      });
    }

    function renderBalanceStats(account, baseTransactions, categoryRows) {
      const legend = document.getElementById('legend');
      const stats = getBalanceStats(account);
      if (!stats) {
        legend.innerHTML = '<div class="empty-note">No balance points are available for this account.</div>';
        return;
      }

      const mappingStats = getMappingStats(baseTransactions, categoryRows);
      legend.innerHTML = `
        <div class="line-chart-details">
          <div class="line-metrics">
            <div class="line-metric-card">
              <div class="section-label">Categories</div>
              <div class="metric-value">${mappingStats.categoryCount}</div>
              <div class="metric-note">Distinct spending buckets in current view</div>
            </div>
            <div class="line-metric-card">
              <div class="section-label">Mapped Coverage</div>
              <div class="metric-value">${mappingStats.coverage.toFixed(1)}%</div>
              <div class="metric-note">Share of spend matched to a named category</div>
            </div>
          </div>
          <div class="chart-footnote">${stats.count} balance points</div>
        </div>
      `;
    }

    function renderTransactions() {
      const rows = document.getElementById('transactionRows');
      const account = getCurrentAccount();
      if (!shouldShowTransactions(account)) {
        rows.innerHTML = '';
        return;
      }

      const items = getVisibleTransactions();
      const totalPages = Math.max(1, Math.ceil(items.length / state.pageSize));
      state.pageIndex = Math.min(state.pageIndex, totalPages - 1);
      const startIndex = state.pageIndex * state.pageSize;
      const visibleItems = items.slice(startIndex, startIndex + state.pageSize);
      rows.innerHTML = visibleItems.map((item) => `
        <tr>
          <td>${item.date}</td>
          <td><span class="badge">${escapeHtml(item.spendingCategory)}</span></td>
          <td>${escapeHtml(item.description)}</td>
          <td class="amount">${currency.format(item.amount)}</td>
        </tr>
      `).join('');

      if (!items.length) {
        rows.innerHTML = '<tr><td colspan="4" class="empty-note">No transactions for the current filter.</td></tr>';
      }
    }

    function renderTransactionCategoryFilter(account, categoryRows) {
      const body = document.getElementById('transactionBody');
      const panel = document.getElementById('transactionCategoryPanel');
      const showPanel = account && account.kind === 'credit_card' && shouldShowTransactions(account);
      body.classList.toggle('has-category-filter', Boolean(showPanel));
      panel.classList.toggle('is-hidden', !showPanel);

      if (!showPanel) {
        panel.innerHTML = '';
        return;
      }

      const total = categoryRows.reduce((sum, row) => sum + row.amount, 0);
      const allActive = state.category ? '' : ' active';
      panel.innerHTML = `
        <button type="button" class="${allActive}" data-category="">
          <div class="legend-top">
            <span class="legend-name">All categories</span>
            <span>${currency.format(total)}</span>
          </div>
        </button>
        ${categoryRows.map((row, index) => {
          const active = state.category === row.category ? ' active' : '';
          return `
            <button type="button" class="${active}" data-category="${escapeHtml(row.category)}">
              <div class="legend-top">
                <div class="legend-left">
                  <span class="swatch" style="background:${pickColor(row.category, index)}"></span>
                  <span class="legend-name">${escapeHtml(row.category)}</span>
                </div>
                <span>${currency.format(row.amount)}</span>
              </div>
              <div class="legend-bottom">
                <span class="legend-meta">${row.count} charges</span>
              </div>
            </button>
          `;
        }).join('')}
      `;

      panel.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {

          render();
        });

    function renderHeadings(account, baseTransactions) {
      const monthText = formatMonth(state.month);

      if (!shouldShowTransactions(account)) {
        return;
      }

      const actionLabel = accountActionLabel(account);
      const heading = account.kind === 'credit_card'
        ? (state.category ? `${state.category} charges` : 'All charges')
        : (state.category ? `${state.category} ${actionLabel} in ${monthText}` : `All ${actionLabel} in ${monthText}`);
      document.getElementById('tableHeading').textContent = heading;
      const visibleCount = getVisibleTransactions().length;
      const startRow = visibleCount === 0 ? 0 : state.pageIndex * state.pageSize + 1;
      const endRow = Math.min(visibleCount, startRow + state.pageSize - 1);
      document.getElementById('tableNote').textContent = `Showing ${startRow}-${endRow} of ${visibleCount} rows.`;

      const clearButton = document.getElementById('clearCategoryButton');
      clearButton.disabled = !state.category;
      clearButton.style.opacity = state.category ? '1' : '0.5';
      clearButton.style.cursor = state.category ? 'pointer' : 'default';
    }

    function renderLayout(account) {
      const content = document.getElementById('contentSection');
      const transactionPanel = document.getElementById('transactionPanel');
      const monthControl = document.getElementById('monthControl');
      const monthlyLineView = shouldShowMonthlySpendingTrend(account) && state.chartMode === 'line';
      const wideChart = account && (account.kind === 'credit_card' || account.kind === 'savings' || monthlyLineView);
      content.classList.toggle('content-wide-chart', Boolean(wideChart));
      transactionPanel.classList.toggle('is-hidden', !shouldShowTransactions(account) || Boolean(monthlyLineView));
      monthControl.classList.toggle('is-hidden', Boolean(isLineChartAccount(account)) || Boolean(monthlyLineView));
    }

    function render() {
      const account = getCurrentAccount();
      if (!account) {
        document.getElementById('summaryCards').innerHTML = '';
        document.getElementById('chartModeSection').innerHTML = '';
        document.getElementById('chartModeSection').classList.add('is-hidden');
        document.getElementById('chartControls').innerHTML = '';
        document.getElementById('chartWrap').innerHTML = '<div class="empty-note">No processed accounts are available.</div>';
        document.getElementById('legend').innerHTML = '';
        document.getElementById('transactionRows').innerHTML = '<tr><td colspan="4" class="empty-note">No accounts found.</td></tr>';
        document.getElementById('transactionCategoryPanel').innerHTML = '';
        document.getElementById('paginationControls').innerHTML = '';
        renderLayout(null);
        return;
      }

      const baseTransactions = getMonthFilteredTransactions();
      const categoryRows = aggregateByCategory(baseTransactions);

      if (state.category && !categoryRows.some((row) => row.category === state.category)) {
        state.category = null;
      }

      renderSummary(account, baseTransactions, categoryRows);
      renderLayout(account);
  renderChartModeControls(account);
      renderChartControls(account);
      if (shouldShowBalanceChart(account)) {
        renderBalanceChart(account);
        renderBalanceStats(account, baseTransactions, categoryRows);
      } else {
        renderChart(categoryRows, account);
        renderLegend(categoryRows, account);
      }
      renderPageSizeToggle(account);
      renderPaginationControls(account, getVisibleTransactions().length);
      renderTransactionCategoryFilter(account, categoryRows);
      renderTransactions();
      renderHeadings(account, baseTransactions);
    }

    document.getElementById('clearCategoryButton').addEventListener('click', () => {
      if (!state.category) {
        return;
      }
      state.category = null;
      state.pageIndex = 0;
      render();
    });

    populateAccountFilter();
    populateMonthFilter();
    render();
  </script>
</body>
</html>
